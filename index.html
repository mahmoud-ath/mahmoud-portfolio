<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mahmoud EL GHARIB - AI & Data Science Specialist</title>
    <meta name="description" content="Portfolio of Mahmoud EL GHARIB — AI & Data Science specialist. Building intelligent software through AI, ML, and modern engineering." />
    <meta name="theme-color" content="#0d1117" />
    <meta name="color-scheme" content="dark light" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.svg" />
    
    <!-- DNS Prefetch -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com">
    <link rel="dns-prefetch" href="https://fonts.gstatic.com">
    
    <!-- Google Fonts with font-display: optional to prevent CLS -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;900&family=Quicksand:wght@300;400;500;600;700&display=optional">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;900&family=Quicksand:wght@300;400;500;600;700&display=optional" rel="stylesheet" media="print" onload="this.media='all'">
    <noscript><link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;900&family=Quicksand:wght@300;400;500;600;700&display=optional" rel="stylesheet"></noscript>
    
    <!-- Preload LCP hero image -->
    <link rel="preload" as="image" href="/General/mahmoud-profile.webp" fetchpriority="high">
    
    <style>
      /* Critical above-fold styles — inlined to prevent render-blocking */
      body {
        background-color: #F8F6F6;
        overflow-x: hidden;
        margin: 0;
        font-family: 'Quicksand', 'Montserrat', sans-serif;
      }
      .dark body, body.dark { background-color: #0d1117; }
      :root { color-scheme: dark light; }
      
      /* Preloader / header placeholder to prevent layout shift */
      #root { min-height: 100vh; }
      
      /* Above-fold hero image sizing hint */
      img[fetchpriority="high"] { 
        max-width: 100%; 
        height: auto; 
      }
      
      /* Utility */
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      a, button, .cursor-hover { cursor: none; }
      
      /* Prevent FOUC — hide body until JS loads */
      body.before-ready { opacity: 0; }
      body.ready { opacity: 1; transition: opacity 0.15s; }
    </style>
    
    <link rel="stylesheet" href="/index.css" media="print" onload="this.media='all'">
    <noscript><link rel="stylesheet" href="/index.css"></noscript>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
